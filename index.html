<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>订单查询中心</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; }
        #result { margin-top: 20px; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; white-space: pre-wrap; font-size: 14px; min-height: 50px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="card">
        <h2>订单查询</h2>
        <input type="text" id="kw" placeholder="请输入订单号或CDK">
        <button onclick="doSearch()">立即查询</button>
        <div id="result">等待查询...</div>
    </div>

    <script>
        async function doSearch() {
            const kw = document.getElementById('kw').value;
            const resDiv = document.getElementById('result');
            if(!kw) return alert('请输入内容');
            
            resDiv.innerHTML = "正在连接服务器并获取数据...";
            
            // 确保这里是 https 且域名正确
            const apiUrl = 'https://myagiso.vip.cpolar.cn/?key=' + encodeURIComponent(kw);

            try {
                const response = await fetch(apiUrl);
                // 解决易语言 GBK 乱码的核心代码
                const buffer = await response.arrayBuffer();
                const decoder = new TextDecoder('gbk');
                const text = decoder.decode(buffer);
                
                console.log("收到数据内容：", text);
                resDiv.innerHTML = text || "未查询到记录。";
            } catch (error) {
                console.error("详细错误信息：", error);
                resDiv.innerHTML = "查询出错！请确保易语言程序已开启且 cpolar 正常。<br>错误详情：" + error.message;
            }
        }
    </script>
</body>
</html>
